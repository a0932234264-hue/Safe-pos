<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>塞弗安全帽連鎖智慧管理控制台 - 雲端跨店 V3 安全升級版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        /* 精準列印控制：專為熱感式收銀機/A4明細優化 */
        @media print {
            body * { visibility: hidden; }
            #receipt-print-area, #receipt-print-area * { visibility: visible; }
            #receipt-print-area { position: absolute; left: 0; top: 0; width: 100%; color: #000 !important; background: #fff !important; }
            .no-print { display: none !important; }
        }
        /* 美化滾動條 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        .ts-all { transition: all 0.2s ease-in-out; }
        
        /* 徹底解決字體縮放問題，採用動態基準變數 */
        :root { --base-font-size: 14px; }
        .dynamic-font { font-size: var(--base-font-size) !important; }

        /* 📱 手機端專屬 RWD 自訂補強樣式 */
        @media (max-width: 768px) {
            :root { --base-font-size: 13px; }
            
            /* 防止桌機懸浮大圖在手機端阻擋點擊，調整為頂部常駐或縮小 */
            .fixed-preview {
                position: fixed !important;
                top: 10px !important;
                left: 50% !important;
                transform: translateX(-50%) !important;
                width: 90% !important;
                max-width: 320px !important;
                box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5) !important;
            }

            /* 手機版按鈕與表單輸入框加大觸控熱區，防誤觸 */
            input, select, button {
                min-height: 42px;
            }

            /* 針對手機表格過寬問題，開啟橫向流暢滾動 */
            .mobile-table-container {
                -webkit-overflow-scrolling: touch;
            }
        }
    </style>
</head>
<body class="bg-[#111827] text-slate-200 font-sans min-h-screen ts-all dynamic-font">

    <div id="app" :style="{ '--base-font-size': currentFontSizePx }" class="min-h-screen flex flex-col relative pb-12 ts-all">
        
        <!-- 登入鎖定遮罩 -->
        <div v-if="!isLoggedIn" class="fixed inset-0 z-50 bg-[#0f172a] flex items-center justify-center p-4">
            <div class="bg-[#1e293b] border border-slate-700 p-6 md:p-8 rounded-2xl shadow-2xl max-w-md w-full border-t-4 border-t-blue-500">
                <div class="text-center mb-6">
                    <div class="inline-block bg-gradient-to-r from-blue-600 to-indigo-600 p-3 rounded-2xl text-white shadow-lg mb-3">
                        <span class="text-xl font-black tracking-widest px-2">SAFEER HELMET</span>
                    </div>
                    <h2 class="text-xl font-black text-white">智慧管理控制台登入</h2>
                    <p class="text-xs text-slate-400 mt-1">請輸入專屬授權密碼以解除安全鎖定</p>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-black text-slate-400 mb-1.5 tracking-wider">🔐 請輸入登入密碼</label>
                        <input type="password" v-model="loginPassword" @keyup.enter="handleLogin" placeholder="請輸入老闆或員工存取密碼" class="w-full p-3 bg-[#111827] border border-slate-600 rounded-xl text-white font-mono text-center text-lg focus:outline-none focus:border-blue-500 tracking-widest">
                    </div>

                    <div v-if="loginError" class="text-xs text-red-400 bg-red-950/50 p-2.5 rounded-lg border border-red-900/40 text-center font-bold">
                        ❌ 密碼認證失敗，請重新輸入或確認雲端設定！
                    </div>

                    <button @click="handleLogin" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-3 rounded-xl shadow-lg transition tracking-widest">
                        驗證密碼並登入系統
                    </button>
                </div>
                
                <div class="text-center text-[11px] text-slate-500 mt-6 border-t border-slate-800 pt-3 flex justify-between items-center">
                    <span>網路狀態: <span :class="isCloudConnected ? 'text-emerald-400':'text-red-400'">{{ isCloudConnected ? '● 已連線':'● 斷線' }}</span></span>
                    <span>雲端跨店正式版 V3</span>
                </div>
            </div>
        </div>

        <!-- 主要系統內容 -->
        <template v-if="isLoggedIn">
            <!-- 雲端狀態條 -->
            <div class="no-print w-full text-center text-xs py-2 px-3 font-black tracking-widest transition-all shadow-inner leading-normal"
                 :class="isCloudConnected ? 'bg-emerald-950 text-emerald-400 border-b border-emerald-900' : 'bg-red-950 text-red-400 border-b border-red-900 animate-pulse'">
                {{ isCloudConnected ? '● 🟢 雲端同步中 ｜ 塞弗安全帽（Safeer Helmet）雲端資料庫已即時互聯' : '● ❌ 雲端連線中斷，請檢查門市網路環境' }}
            </div>

            <!-- 懸浮大圖預覽 -->
            <div v-if="hoverImageUrl" 
                 :style="{ top: hoverY + 15 + 'px', left: hoverX + 15 + 'px' }" 
                 class="fixed-preview fixed z-50 bg-[#1f2937] p-2 rounded-xl shadow-2xl border border-slate-700 pointer-events-none">
                <img :src="hoverImageUrl" class="w-full md:w-72 h-48 md:h-72 object-cover rounded-lg">
                <div class="text-center text-xs text-slate-400 mt-2 font-bold tracking-wider">📦 商品識別大圖</div>
            </div>

            <!-- 庫存調撥彈窗 -->
            <div v-if="showTransferModal" class="fixed inset-0 z-50 bg-black/70 backdrop-blur-sm flex items-center justify-center p-3 md:p-4 overflow-y-auto">
                <div class="bg-[#1f2937] border border-slate-700 rounded-2xl shadow-2xl p-4 md:p-6 max-w-lg w-full my-auto">
                    <h4 class="text-lg md:text-xl font-bold text-blue-400 mb-2 flex items-center gap-2">🔀 跨店庫存調撥 (權限控管)</h4>
                    <p class="text-xs md:text-sm text-slate-300 mb-4 bg-[#111827] p-3 md:p-4 rounded-xl border border-slate-800 leading-relaxed">
                        商品：<span class="text-white font-black text-base">[{{ transferItem.brand }}] {{ transferItem.model }}</span><br>
                        規格：顏色 <span class="text-slate-100 font-bold">{{ transferItem.color }}</span> ｜ 尺寸 <span class="text-yellow-400 font-black">{{ transferItem.size }}</span><br>
                        實時存量：一號店 <span class="text-blue-400 font-black text-base">{{ getStockInStore(transferItem, 'store_1') }}</span> 頂 ｜ 二號店 <span class="text-blue-400 font-black text-base">{{ getStockInStore(transferItem, 'store_2') }}</span> 頂
                    </p>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-400 mb-1.5">調撥流向：</label>
                            <select v-model="transferDirection" class="w-full p-2.5 bg-[#111827] border border-slate-600 rounded-lg text-xs md:text-sm text-slate-200 focus:outline-none focus:border-blue-500 font-bold">
                                <option value="1_to_2">由【一號店 (內埔總店)】調往【二號店 (學區分店)】</option>
                                <option value="2_to_1">由【二號店 (學區分店)】調往【一號店 (內埔總店)】</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 mb-1.5">調撥出庫數量 (頂)：</label>
                            <input type="number" v-model.number="transferQty" min="1" class="w-full p-2.5 bg-[#111827] border border-slate-600 rounded-lg text-base md:text-lg font-black text-white text-center focus:outline-none focus:border-blue-500">
                        </div>
                    </div>
                    <div class="flex space-x-3 mt-6">
                        <button @click="showTransferModal = false" class="flex-1 bg-slate-700 hover:bg-slate-600 text-slate-200 py-2.5 md:py-3 rounded-lg text-xs md:text-sm font-bold transition">取消</button>
                        <button @click="executeTransfer" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white py-2.5 md:py-3 rounded-lg text-xs md:text-sm font-bold transition shadow-lg shadow-blue-900/30">確認調撥執行</button>
                    </div>
                </div>
            </div>

            <!-- 銷售簽單明細彈窗 -->
            <div v-if="showReceiptModal" class="fixed inset-0 z-50 bg-black/70 backdrop-blur-sm flex items-center justify-center p-3 md:p-4 overflow-y-auto">
                <div class="bg-[#1f2937] border border-slate-700 rounded-2xl shadow-2xl p-4 md:p-6 max-w-md w-full my-auto">
                    <div class="flex justify-between items-center border-b border-slate-700 pb-3 mb-4 no-print">
                        <h4 class="text-sm md:text-base font-bold text-emerald-400 flex items-center gap-1.5">🧾 交易成功！銷售明細單</h4>
                        <button @click="showReceiptModal = false" class="text-slate-400 hover:text-slate-200 text-xl">✕</button>
                    </div>
                    
                    <div id="receipt-print-area" class="bg-white p-4 md:p-5 border-2 border-dashed border-gray-400 font-mono text-xs text-gray-900 space-y-2 max-h-[60vh] md:max-h-[500px] overflow-y-auto rounded-md shadow-inner">
                        <div class="text-center font-black text-lg tracking-wider text-black">塞弗安全帽控制台</div>
                        <div class="text-center font-bold text-sm text-gray-700">【{{ lastReceiptData.storeName }}】</div>
                        <div class="text-center text-[11px] text-gray-500">銷貨簽單 / 顧客購買明細</div>
                        <div class="border-b border-dashed border-gray-400 my-2"></div>
                        <p class="text-[11px]">時間：{{ lastReceiptData.date }}</p>
                        <p class="text-[11px]">單號：🪖 SF-{{ lastReceiptData.timestamp }}</p>
                        <p class="text-[11px]">經辦櫃檯：{{ lastReceiptData.role === 'admin' ? '系統老闆' : '門市員工' }}</p>
                        <div class="border-b border-dashed border-gray-400 my-2"></div>
                        
                        <table class="w-full text-left text-[12px] text-gray-900">
                            <thead>
                                <tr class="border-b border-gray-400 font-bold text-black">
                                    <th class="pb-1">品項安全帽規格</th>
                                    <th class="pb-1 text-center">數量</th>
                                    <th class="pb-1 text-right">小計</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr v-for="item in lastReceiptData.items" :key="item.id">
                                    <td class="py-2">
                                        <div class="font-black text-[13px] text-black">[{{ item.brand }}] {{ item.model }}</div>
                                        <div class="text-[11px] text-gray-600 font-bold">外觀：{{ item.color }} ｜ 尺寸：{{ item.size }}</div>
                                    </td>
                                    <td class="py-2 text-center font-black text-[13px] text-black">x{{ item.qty }}</td>
                                    <td class="py-2 text-right font-mono font-bold text-black">$ {{ item.singlePrice * item.qty }}</td>
                                </tr>
                            </tbody>
                        </table>

                        <div class="border-b border-dashed border-gray-400 my-2"></div>
                        <div class="space-y-1 text-right font-black text-gray-900">
                            <p v-if="lastReceiptData.orderDiscount > 0" class="text-red-600 text-[12px]">整單議價折讓：- $ {{ lastReceiptData.orderDiscount }}</p>
                            <p class="text-base text-black bg-gray-100 p-1.5 inline-block rounded font-black border border-gray-300">實收總計：$ {{ lastReceiptData.finalTotal }}</p>
                        </div>
                        <div class="border-b border-dashed border-gray-400 my-2"></div>
                        <div class="text-[11px] text-gray-700 space-y-1 pt-1 leading-relaxed font-sans">
                            <p class="font-bold text-black">⚠️ 售後服務與保養須知：</p>
                            <p>1. 安全帽請於現場確認外觀零部件，離店非特殊功能瑕疵恕不接受退換。</p>
                            <p>2. 內襯拆洗請使用中性肥皂水，帽體鏡片請以軟布拭擦，切勿接觸強酸強鹼有機溶劑。</p>
                            <p class="text-center font-black mt-3 text-black text-[12px] tracking-wider">✨ 感謝您的支持，塞弗祝您騎車平安！ ✨</p>
                        </div>
                    </div>

                    <div class="flex space-x-3 mt-5 no-print">
                        <button @click="showReceiptModal = false" class="flex-1 bg-slate-700 hover:bg-slate-600 text-slate-300 py-3 rounded-lg text-sm font-bold transition">關閉</button>
                        <button @click="printReceipt" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white py-3 rounded-lg text-sm font-bold transition flex items-center justify-center space-x-1 shadow-lg shadow-emerald-900/40">
                            <span>🖨️ 列印銷貨簽單</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 主頂部導航列 -->
            <header class="bg-[#1f2937] text-slate-100 p-3 md:p-4 shadow-xl border-b border-slate-800 flex flex-col gap-3 sm:flex-row sm:justify-between sm:items-center sticky top-0 z-40 backdrop-blur-md bg-opacity-95 no-print">
                <div class="flex items-center justify-between sm:justify-start space-x-3 w-full sm:w-auto">
                    <div class="flex items-center space-x-2">
                        <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-1.5 md:p-2 rounded-xl text-white shadow-md shadow-blue-900/40">
                            <span class="text-base md:text-xl font-black tracking-widest px-1">SAFEER</span>
                        </div>
                        <h1 class="text-base md:text-xl font-black text-slate-100 tracking-wide">連鎖控制台</h1>
                    </div>
                    <select v-model="currentStore" @change="clearPurchaseCart" class="bg-[#111827] text-blue-400 px-3 py-1.5 rounded-xl border-2 border-slate-700 text-xs md:text-base font-black focus:outline-none focus:border-blue-500 cursor-pointer shadow-inner">
                        <option value="store_1">一號店 (內埔總店)</option>
                        <option value="store_2">二號店 (學區分店)</option>
                    </select>
                </div>
                
                <div class="flex items-center justify-between sm:justify-end gap-2 bg-[#111827] p-2 rounded-xl border border-slate-800 shadow-inner w-full sm:w-auto overflow-x-auto">
                    <div class="flex items-center space-x-1 border-r border-slate-700 pr-2 mr-1 shrink-0">
                        <span class="text-[10px] font-bold text-slate-500 mr-1 hidden md:inline">字體大小</span>
                        <button @click="changeZoom('small')" :class="fontSizeLevel === 'small' ? 'bg-slate-600 text-white font-bold' : 'text-slate-400 hover:bg-slate-800'" class="px-1.5 py-0.5 text-[10px] rounded transition">A-</button>
                        <button @click="changeZoom('normal')" :class="fontSizeLevel === 'normal' ? 'bg-blue-600 text-white font-bold' : 'text-slate-400 hover:bg-slate-800'" class="px-1.5 py-0.5 text-[10px] rounded transition">標準</button>
                        <button @click="changeZoom('large')" :class="fontSizeLevel === 'large' ? 'bg-amber-600 text-white font-black scale-105' : 'text-slate-400 hover:bg-slate-800'" class="px-1.5 py-0.5 text-[10px] rounded transition">A+</button>
                    </div>

                    <div class="flex items-center space-x-1 shrink-0">
                        <span class="text-xs font-bold px-2 py-1 rounded bg-[#1f2937] border border-slate-700" :class="currentRole === 'admin' ? 'text-amber-400':'text-slate-300'">
                            身分: {{ currentRole === 'admin' ? '👑 老闆' : '💼 員工' }}
                        </span>
                        <button v-if="currentRole === 'staff'" @click="switchRoleSecurely('admin')" class="bg-amber-700/80 hover:bg-amber-600 text-white font-bold px-2.5 py-1 rounded-lg text-xs transition-all">切換老闆</button>
                        <button v-if="currentRole === 'admin'" @click="switchRoleSecurely('staff')" class="bg-slate-700 hover:bg-slate-600 text-slate-200 font-bold px-2.5 py-1 rounded-lg text-xs transition-all">切換員工</button>
                        <button @click="handleLogout" class="text-xs text-red-400 hover:text-red-300 bg-red-950/30 px-2 py-1 rounded border border-red-900/40 font-bold">登出</button>
                    </div>
                </div>
            </header>

            <!-- 儀表板核心區塊 -->
            <main class="flex-1 p-3 md:p-6 max-w-[1600px] w-full mx-auto grid grid-cols-1 lg:grid-cols-3 gap-4 md:gap-6 no-print">
                
                <!-- 左側與中央：安全帽即時盤點管理表 -->
                <div class="lg:col-span-2 space-y-4 md:space-y-6">
                    <div class="bg-[#1f2937] p-4 md:p-6 rounded-2xl shadow-xl border border-slate-800">
                        <div class="border-b border-slate-700 pb-4 mb-4">
                            <h2 class="font-black text-slate-100 flex flex-col md:flex-row md:justify-between md:items-center gap-2 mb-3">
                                <span class="flex items-center gap-2 text-base md:text-xl"><span class="text-blue-500">🪖</span> {{ storeName }} - 即時動態庫存盤點表</span>
                                <span class="text-[10px] md:text-xs bg-emerald-950/80 text-emerald-400 px-3 py-1 rounded-full border border-emerald-400 font-bold tracking-wider self-start md:self-auto">● 數據與雲端同頻</span>
                            </h2>
                            
                            <div class="flex flex-wrap gap-1.5 items-center bg-[#111827] p-2 rounded-xl border border-slate-800">
                                <span class="text-xs text-slate-400 font-black pl-1 w-full sm:w-auto">篩選:</span>
                                <div class="flex flex-wrap gap-1.5 w-full sm:w-auto">
                                    <button @click="selectedBrandTag = 'ALL'" 
                                            :class="selectedBrandTag === 'ALL' ? 'bg-blue-600 text-white shadow-md shadow-blue-900/30' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'"
                                            class="text-xs px-2.5 py-1.5 rounded-lg font-black transition-all">
                                        全部 ({{ totalCountByBrand('ALL') }})
                                    </button>
                                    <button v-for="brand in availableBrands" :key="brand"
                                            @click="selectedBrandTag = brand"
                                            :class="selectedBrandTag === brand ? 'bg-blue-600 text-white shadow-md shadow-blue-900/30' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'"
                                            class="text-xs px-2.5 py-1.5 rounded-lg font-black transition-all uppercase tracking-wider">
                                        {{ brand }} ({{ totalCountByBrand(brand) }})
                                    </button>
                                </div>
                                
                                <button @click="selectedBrandTag = 'LOW_STOCK'" 
                                        :class="selectedBrandTag === 'LOW_STOCK' ? 'bg-red-600 text-white shadow-md shadow-red-900/40' : 'bg-red-950/50 text-red-400 hover:bg-red-900/40 border border-red-900/50'"
                                        class="text-xs px-2.5 py-1.5 rounded-lg font-black transition-all flex items-center space-x-1 mt-1 sm:mt-0 sm:ml-auto">
                                    <span>⚠️ 補貨預警 ({{ lowStockCount }})</span>
                                </button>
                            </div>
                        </div>

                        <!-- 商品資料表格 -->
                        <div class="mobile-table-container overflow-x-auto w-full">
                            <table class="w-full text-left border-collapse min-w-[650px] md:min-w-0">
                                <thead>
                                    <tr class="bg-[#111827] text-slate-300 text-xs md:text-sm font-bold tracking-wider border-b border-slate-800">
                                        <th class="p-3 md:p-4 w-16 text-center rounded-l-xl">縮圖</th>
                                        <th class="p-3 md:p-4 text-sm md:text-base">品牌 / 型號規格</th>
                                        <th class="p-3 md:p-4 text-right text-sm md:text-base" style="width: 130px;">現貨庫存</th>
                                        <th class="p-3 md:p-4 text-right text-sm md:text-base" v-if="currentRole === 'admin' || sysSettings.allowStaffViewCost" style="width: 100px;">進價成本</th>
                                        <th class="p-3 md:p-4 text-right text-sm md:text-base" style="width: 150px;">對外零售價</th>
                                        <th class="p-3 md:p-4 text-center text-sm md:text-base rounded-r-xl" style="width: 120px;">操作/營運</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-800/60">
                                    <tr v-for="item in sortedAndFilteredInventory" :key="item.id" class="hover:bg-slate-800/40 transition-all group">
                                        <td class="p-3 md:p-4 text-center">
                                            <div class="w-12 h-12 md:w-14 md:h-14 cursor-zoom-in inline-block relative border border-slate-700 rounded-xl overflow-hidden bg-slate-900 group-hover:border-blue-500">
                                                <img :src="item.image || 'https://images.unsplash.com/photo-1599819811279-d5ad9cccf838?w=150&auto=format&fit=crop&q=60'" 
                                                     @mousemove="showBigImage($event, item.image || 'https://images.unsplash.com/photo-1599819811279-d5ad9cccf838?w=300')"
                                                     @mouseleave="hideBigImage"
                                                     class="w-full h-full object-cover">
                                            </div>
                                        </td>
                                        <td class="p-3 md:p-4">
                                            <div class="flex flex-wrap items-center gap-1">
                                                <span class="text-[10px] font-black bg-blue-950 text-blue-400 border border-blue-900/60 px-2 py-0.5 rounded uppercase tracking-wider">{{ item.brand }}</span>
                                                <span class="text-[10px] font-black bg-slate-800 text-slate-300 px-2 py-0.5 rounded tracking-wide">{{ item.category }}</span>
                                            </div>
                                            <div class="font-black text-white text-base md:text-lg mt-1 tracking-wide group-hover:text-blue-400 transition-colors">{{ item.model }}</div>

                        <!-- 結帳優惠折讓與計價 -->

    <!-- 💡 Vue 3 核心數據整合架構與 Firebase 雲端跨店即時同步模組 -->
    <script>
        const { createApp, ref, computed, onMounted } = Vue;

        createApp({
            setup() {
                // 1. 系統安全驗證與身分模組
                const isLoggedIn = ref(false);
                const loginPassword = ref('');
                const loginError = ref(false);
                const currentRole = ref('staff'); // 預設為前台員工身分
                const isCloudConnected = ref(false);
                
                // 2. 字體與視覺大小適應
                const fontSizeLevel = ref('normal');
                const currentFontSizePx = computed(() => {
                    if (fontSizeLevel.ref === 'small') return '12px';
                    if (fontSizeLevel.value === 'large') return '16px';
                    return '14px';
                });

                // 3. 店別與商品大圖懸浮
                const currentStore = ref('store_1');
                const storeName = computed(() => currentStore.value === 'store_1' ? '一號店 (內埔總店)' : '二號店 (學區分店)');
                const selectedBrandTag = ref('ALL');
                
                const hoverImageUrl = ref('');
                const hoverX = ref(0);
                const hoverY = ref(0);

                // 4. 跨店即時連線控制核心庫存矩陣
                const globalInventory = ref([]);
                
                // 5. 老闆安全設定微調參數
                const sysSettings = ref({
                    bossPassword: '888',   // 預設老闆密碼
                    staffPassword: '123',  // 預設員工密碼
                    allowStaffViewCost: false,
                    allowStaffDiscount: false,
                    allowStaffTransfer: false
                });

                // 6. 收銀購物車控制
                const purchaseCart = ref([]);
                const orderDiscount = ref(0);
                const showTransferModal = ref(false);
                const transferItem = ref({});
                const transferDirection = ref('1_to_2');
                const transferQty = ref(1);

                // 7. 列印與最後銷售紀錄暫存
                const showReceiptModal = ref(false);
                const lastReceiptData = ref({
                    storeName: '', timestamp: '', date: '', role: '', items: [], orderDiscount: 0, finalTotal: 0
                });

                // -------------------------------------------------------------
                // FIREBASE 雲端初始化與資料庫實時雙向監聽
                // -------------------------------------------------------------
                // 提示：請在此處替換為您個人或門市專屬的 Firebase 憑證資訊
                const firebaseConfig = {
                    databaseURL: "https://safeer-helmet-default-rtdb.firebaseio.com/" 
                };

                let db = null;
                onMounted(() => {
                    try {
                        if (!firebase.apps.length) {
                            firebase.initializeApp(firebaseConfig);
                        }
                        db = firebase.database();
                        isCloudConnected.value = true;

                        // 實時雙向監聽雲端庫存異動
                        db.ref('inventory').on('value', (snapshot) => {
                            const data = snapshot.val();
                            if (data) {
                                globalInventory.value = Object.keys(data).map(key => ({ id: key, ...data[key] }));
                            } else {
                                // 初始建立預設商品庫存矩陣
                                seedDefaultInventory();
                            }
                        });

                        // 實時雙向監聽系統核心設定與密碼權限
                        db.ref('settings').on('value', (snapshot) => {
                            const data = snapshot.val();
                            if (data) { sysSettings.value = data; }
                        });
                    } catch (e) {
                        console.error("Firebase 連線失敗，啟動本地模擬展示模式: ", e);
                        isCloudConnected.value = false;
                        seedDefaultInventoryLocal();
                    }
                });

                // 初始化安全帽範例數據至雲端
                function seedDefaultInventory() {
                    const sample = {
                        "p1": { brand: "M2R", model: "FR-2 戰警", category: "四分之三帽", color: "消光黑", size: "XL", price: 2300, cost: 1400, clearancePrice: 0, safeStock: 3, stock_store_1: 8, stock_store_2: 4, image: "" },
                        "p2": { brand: "SHOEI", model: "J-Cruise II", category: "頂級開放式", color: "珍珠白", size: "L", price: 18000, cost: 13500, clearancePrice: 0, safeStock: 1, stock_store_1: 2, stock_store_2: 1, image: "" },
                        "p3": { brand: "MONGOLIAN", model: "蒙古人復古帽", category: "復古全罩", color: "水泥灰", size: "M", price: 3800, cost: 2200, clearancePrice: 3200, safeStock: 2, stock_store_1: 5, stock_store_2: 0, image: "" },
                        "p4": { brand: "GALLOP", model: "經典復古 3/4", category: "四分之三帽", color: "乳酪白", size: "S", price: 2800, cost: 1650, clearancePrice: 0, safeStock: 2, stock_store_1: 1, stock_store_2: 6, image: "" }
                    };
                    if(db) db.ref('inventory').set(sample);
                }

                function seedDefaultInventoryLocal() {
                    globalInventory.value = [
                        { id: "p1", brand: "M2R", model: "FR-2 戰警", category: "四分之三帽", color: "消光黑", size: "XL", price: 2300, cost: 1400, clearancePrice: 0, safeStock: 3, stock_store_1: 8, stock_store_2: 4 },
                        { id: "p2", brand: "SHOEI", model: "J-Cruise II", category: "頂級開放式", color: "珍珠白", size: "L", price: 18000, cost: 13500, clearancePrice: 0, safeStock: 1, stock_store_1: 2, stock_store_2: 1 },
                        { id: "p3", brand: "MONGOLIAN", model: "蒙古人復古帽", category: "復古全罩", color: "水泥灰", size: "M", price: 3800, cost: 2200, clearancePrice: 3200, safeStock: 2, stock_store_1: 5, stock_store_2: 0 },
                        { id: "p4", brand: "GALLOP", model: "經典復古 3/4", category: "四分之三帽", color: "乳酪白", size: "S", price: 2800, cost: 1650, clearancePrice: 0, safeStock: 2, stock_store_1: 1, stock_store_2: 6 }
                    ];
                }

                // -------------------------------------------------------------
                // 核心控制邏輯
                // -------------------------------------------------------------
                const handleLogin = () => {
                    if (loginPassword.value === sysSettings.value.bossPassword) {
                        isLoggedIn.value = true;
                        currentRole.value = 'admin';
                        loginError.value = false;
                    } else if (loginPassword.value === sysSettings.value.staffPassword) {
                        isLoggedIn.value = true;
                        currentRole.value = 'staff';
                        loginError.value = false;
                    } else {
                        loginError.value = true;
                    }
                };

                const handleLogout = () => {
                    isLoggedIn.value = false;
                    loginPassword.value = '';
                };

                const switchRoleSecurely = (target) => {
                    if (target === 'staff') {
                        currentRole.value = 'staff';
                    } else {
                        const pass = prompt("🔐 請輸入「老闆」專屬授權驗證密碼：");
                        if (pass === sysSettings.value.bossPassword) {
                            currentRole.value = 'admin';
                        } else if (pass !== null) {
                            alert("❌ 密碼認證錯誤！防越權失敗。");
                        }
                    }
                };

                const changeZoom = (level) => { fontSizeLevel.value = level; };

                // 計算當前分店的即時商品矩陣
                const sortedAndFilteredInventory = computed(() => {
                    return globalInventory.value.map(item => {
                        // 依據店別動態組裝對應的 stock 欄位值
                        return {
                            ...item,
                            stock: currentStore.value === 'store_1' ? item.stock_store_1 : item.stock_store_2
                        };
                    }).filter(item => {
                        if (selectedBrandTag.value === 'ALL') return true;
                        if (selectedBrandTag.value === 'LOW_STOCK') return item.stock <= item.safeStock;
                        return item.brand.toUpperCase() === selectedBrandTag.value.toUpperCase();
                    });
                });

                const availableBrands = computed(() => {
                    const brands = globalInventory.value.map(i => i.brand.toUpperCase());
                    return [...new Set(brands)];
                });

                const lowStockCount = computed(() => {
                    return globalInventory.value.filter(item => {
                        const s = currentStore.value === 'store_1' ? item.stock_store_1 : item.stock_store_2;
                        return s <= item.safeStock;
                    }).length;
                });

                const totalCountByBrand = (brand) => {
                    return globalInventory.value.filter(item => {
                        const s = currentStore.value === 'store_1' ? item.stock_store_1 : item.stock_store_2;
                        if (brand === 'ALL') return true;
                        return item.brand.toUpperCase() === brand.toUpperCase();
                    }).length;
                };

                // 老闆直接更新單店庫存、定價、促銷出清價
                const updateSingleProductCloud = (item) => {
                    if (currentRole.value !== 'admin') return;
                    if (db) {
                        const updateData = {};
                        if (currentStore.value === 'store_1') {
                            updateData[`inventory/${item.id}/stock_store_1`] = item.stock;
                        } else {
                            updateData[`inventory/${item.id}/stock_store_2`] = item.stock;
                        }
                        updateData[`inventory/${item.id}/price`] = item.price;
                        updateData[`inventory/${item.id}/clearancePrice`] = item.clearancePrice || 0;
                        db.ref().update(updateData);
                    }
                };

                const saveSettingsToCloud = () => {
                    if (db && currentRole.value === 'admin') {
                        db.ref('settings').set(sysSettings.value);
                    }
                };

                // -------------------------------------------------------------
                // 跨店調撥功能
                // -------------------------------------------------------------
                const getStockInStore = (item, storeKey) => {
                    const target = globalInventory.value.find(i => i.id === item.id);
                    if (!target) return 0;
                    return storeKey === 'store_1' ? target.stock_store_1 : target.stock_store_2;
                };

                const openTransferModal = (item) => {
                    transferItem.value = item;
                    transferQty.value = 1;
                    transferDirection.value = currentStore.value === 'store_1' ? '1_to_2' : '2_to_1';
                    showTransferModal.value = true;
                };

                const executeTransfer = () => {
                    const qty = parseInt(transferQty.value);
                    if (isNaN(qty) || qty <= 0) { alert("請輸入有效的正整數調撥數量！"); return; }

                    const targetProduct = globalInventory.value.find(i => i.id === transferItem.value.id);
                    if (!targetProduct) return;

                    let sourceStock = transferDirection.value === '1_to_2' ? targetProduct.stock_store_1 : targetProduct.stock_store_2;
                    
                    if (sourceStock < qty) {
                        alert(`❌ 調撥失敗！撥出分店現貨庫存不足（剩餘 ${sourceStock} 頂），無法撥出。`);
                        return;
                    }

                    if (db) {
                        const updates = {};
                        if (transferDirection.value === '1_to_2') {
                            updates[`inventory/${targetProduct.id}/stock_store_1`] = targetProduct.stock_store_1 - qty;
                            updates[`inventory/${targetProduct.id}/stock_store_2`] = targetProduct.stock_store_2 + qty;
                        } else {
                            updates[`inventory/${targetProduct.id}/stock_store_1`] = targetProduct.stock_store_1 + qty;
                            updates[`inventory/${targetProduct.id}/stock_store_2`] = targetProduct.stock_store_2 - qty;
                        }
                        db.ref().update(updates).then(() => {
                            showTransferModal.value = false;
                            alert("🔀 雲端跨店庫存調撥成功！兩店水位已即時同頻更新。");
                        });
                    } else {
                        // 本地模擬
                        if (transferDirection.value === '1_to_2') {
                            targetProduct.stock_store_1 -= qty;
                            targetProduct.stock_store_2 += qty;
                        } else {
                            targetProduct.stock_store_1 += qty;
                            targetProduct.stock_store_2 -= qty;
                        }
                        showTransferModal.value = false;
                        alert("🔀 本地模擬庫存調撥成功。");
                    }
                };

                // -------------------------------------------------------------
                // 前台臨櫃收銀模組
                // -------------------------------------------------------------
                const addToCart = (item) => {
                    const price = item.clearancePrice > 0 ? item.clearancePrice : item.price;
                    const exist = purchaseCart.value.find(c => c.id === item.id);
                    
                    if (exist) {
                        if (exist.qty >= item.stock) { alert("臨櫃購買量已達該店現貨庫存上限！"); return; }
                        exist.qty++;
                    } else {
                        purchaseCart.value.push({
                            id: item.id,
                            brand: item.brand,
                            model: item.model,
                            size: item.size,
                            color: item.color,
                            singlePrice: price,
                            qty: 1
                        });
                    }
                };

                const updateCartQty = (cartItem, change) => {
                    const originProduct = globalInventory.value.find(i => i.id === cartItem.id);
                    const maxStock = currentStore.value === 'store_1' ? originProduct.stock_store_1 : originProduct.stock_store_2;
                    
                    cartItem.qty += change;
                    if (cartItem.qty > maxStock) {
                        alert("臨櫃數量超出分店庫存現貨！");
                        cartItem.qty = maxStock;
                    }
                    if (cartItem.qty <= 0) removeFromCart(cartItem);
                };

                const removeFromCart = (cartItem) => {
                    purchaseCart.value = purchaseCart.value.filter(c => c.id !== cartItem.id);
                };

                const clearPurchaseCart = () => {
                    purchaseCart.value = [];
                    orderDiscount.value = 0;
                };

                const cartSubtotal = computed(() => {
                    return purchaseCart.value.reduce((sum, item) => sum + (item.singlePrice * item.qty), 0);
                });

                const cartFinalTotal = computed(() => {
                    const total = cartSubtotal.value - orderDiscount.value;
                    return total < 0 ? 0 : total;
                });

                // 結帳扣庫存並導向銷貨單列印
                const submitCheckout = () => {
                    if (purchaseCart.value.length === 0) return;

                    // 檢查與雲端庫存最終一致性
                    for (let cartItem of purchaseCart.value) {
                        const prod = globalInventory.value.find(i => i.id === cartItem.id);
                        const currentStock = currentStore.value === 'store_1' ? prod.stock_store_1 : prod.stock_store_2;
                        if (currentStock < cartItem.qty) {
                            alert(`❌ 結帳中止！商品 [${cartItem.model}] 現貨不足，期間可能已被同仁售出。`);
                            return;
                        }
                    }

                    const now = new Date();
                    const timestampStr = now.getTime();
                    const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

                    // 備妥列印與明細簽單數據
                    lastReceiptData.value = {
                        storeName: storeName.value,
                        timestamp: timestampStr,
                        date: dateStr,
                        role: currentRole.value,
                        items: [...purchaseCart.value],
                        orderDiscount: orderDiscount.value,
                        finalTotal: cartFinalTotal.value
                    };

                    // 更新扣除庫存至雲端
                    if (db) {
                        const updates = {};
                        purchaseCart.value.forEach(cartItem => {
                            const prod = globalInventory.value.find(i => i.id === cartItem.id);
                            if (currentStore.value === 'store_1') {
                                updates[`inventory/${cartItem.id}/stock_store_1`] = prod.stock_store_1 - cartItem.qty;
                            } else {
                                updates[`inventory/${cartItem.id}/stock_store_2`] = prod.stock_store_2 - cartItem.qty;
                            }
                        });
                        db.ref().update(updates).then(() => {
                            clearPurchaseCart();
                            showReceiptModal.value = true;
                        });
                    } else {
                        // 本地模擬扣庫存
                        purchaseCart.value.forEach(cartItem => {
                            const prod = globalInventory.value.find(i => i.id === cartItem.id);
                            if (currentStore.value === 'store_1') prod.stock_store_1 -= cartItem.qty;
                            else prod.stock_store_2 -= cartItem.qty;
                        });
                        clearPurchaseCart();
                        showReceiptModal.value = true;
                    }
                };

                const printReceipt = () => {
                    window.print();
                };

                // 8. 縮圖懸浮控制
                const showBigImage = (e, url) => {
                    hoverImageUrl.value = url;
                    hoverX.value = e.clientX;
                    hoverY.value = e.clientY;
                };
                const hideBigImage = () => { hoverImageUrl.value = ''; };

                return {
                    isLoggedIn, loginPassword, loginError, currentRole, handleLogin, handleLogout, switchRoleSecurely,
                    fontSizeLevel, currentFontSizePx, changeZoom, currentStore, storeName, selectedBrandTag,
                    hoverImageUrl, hoverX, hoverY, showBigImage, hideBigImage,
                    sortedAndFilteredInventory, availableBrands, lowStockCount, totalCountByBrand, updateSingleProductCloud,
                    sysSettings, saveSettingsToCloud, isCloudConnected,
                    purchaseCart, orderDiscount, addToCart, updateCartQty, removeFromCart, clearPurchaseCart,
                    cartSubtotal, cartFinalTotal, showTransferModal, transferItem, transferDirection, transferQty,
                    openTransferModal, executeTransfer, getStockInStore, submitCheckout, showReceiptModal, lastReceiptData, printReceipt
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
